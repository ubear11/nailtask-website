  # ----------------------------------------------------------
  # 10. 站点设置 (Site Settings)
  # ----------------------------------------------------------
  - name: "settings"
    label: "站点设置 / Site Settings"
    description: "全站配置、SEO、分析工具和CRM集成"
    files:
      - label: "常规设置 / General Settings"
        name: "general"
        file: "content/settings/general.md"
        fields:
          - { label: "站点名称 / Site Title", name: "siteTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
          - { label: "站点Logo / Site Logo", name: "siteLogo", widget: "image", required: false }
          - { label: "Favicon", name: "favicon", widget: "image", required: false }

          # Analytics & Tracking
          - label: "分析追踪 / Analytics & Tracking"
            name: "analytics"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Google Analytics ID (GA4)", name: "gaId", widget: "string", required: false, hint: "GA4 Measurement ID (如 G-XXXXXXX)" }
              - { label: "Google Tag Manager ID", name: "gtmId", widget: "string", required: false, hint: "GTM Container ID (如 GTM-XXXXXXX)" }
              - { label: "Google Search Console 验证", name: "gscVerification", widget: "string", required: false }
              - { label: "百度统计ID / Baidu Analytics", name: "baiduId", widget: "string", required: false }

          # Contact Info
          - label: "联系信息 / Contact Information"
            name: "contact_info"
            widget: "object"
            collapsed: true
            fields:
              - { label: "联系邮箱 / Contact Email", name: "contactEmail", widget: "string" }
              - { label: "联系电话 / Contact Phone", name: "contactPhone", widget: "string", required: false }
              - { label: "WhatsApp号码 / WhatsApp Number", name: "whatsappNumber", widget: "string", required: false }
              - { label: "Skype ID", name: "skypeId", widget: "string", required: false }
              - { label: "微信号 / WeChat ID", name: "wechatId", widget: "string", required: false }
              - { label: "公司地址 / Company Address", name: "address", widget: "text", required: false }

          # CRM Integration
          - label: "CRM集成 / CRM Integration"
            name: "crm"
            widget: "object"
            collapsed: true
            fields:
              - label: "CRM类型 / CRM Provider"
                name: "crm_provider"
                widget: "select"
                required: false
                options:
                  - { label: "小满 Okki CRM", value: "okki" }
                  - { label: "企业邮箱 / Enterprise Email", value: "email" }
                  - { label: "自定义API / Custom API", value: "custom" }
                  - { label: "禁用 / Disabled", value: "disabled" }
              - { label: "CRM API Endpoint", name: "crm_api_endpoint", widget: "string", required: false, hint: "CRM系统API地址" }
              - { label: "通知邮箱 / Notification Email", name: "notification_email", widget: "string", required: false, hint: "接收新线索通知的邮箱" }

          # Multi-language
          - label: "多语言设置 / Multi-language Settings"
            name: "i18n"
            widget: "object"
            collapsed: true
            fields:
              - { label: "默认语言 / Default Language", name: "default_lang", widget: "select", options: ["en", "zh", "es", "de", "fr"], default: "en" }
              - label: "启用语言 / Enabled Languages"
                name: "enabled_languages"
                widget: "select"
                multiple: true
                options:
                  - { label: "English", value: "en" }
                  - { label: "中文 / Chinese", value: "zh" }
                  - { label: "Español / Spanish", value: "es" }
                  - { label: "Deutsch / German", value: "de" }
                  - { label: "Français / French", value: "fr" }
                  - { label: "Português / Portuguese", value: "pt" }
                  - { label: "العربية / Arabic", value: "ar" }
                  - { label: "日本語 / Japanese", value: "ja" }
                  - { label: "한국어 / Korean", value: "ko" }

      - label: "社交媒体 / Social Media"
        name: "social"
        file: "content/settings/social.md"
        fields:
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Twitter/X URL", name: "twitter", widget: "string", required: false }
          - { label: "阿里巴巴 / Alibaba URL", name: "alibaba", widget: "string", required: false }
          - { label: "Made-in-China URL", name: "madeinchina", widget: "string", required: false }
