<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>内容管理系统 – NailTask CMS</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Custom admin panel styling to match NailTask brand */
    [data-testid="nc-root"] {
      --nc-color-primary: #f59e0b;
    }

    .css-yqwkmh {
      background-color: #0f172a !important;
    }

    .cms-help-banner {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.6;
      border-bottom: 3px solid #f59e0b;
    }
    .cms-help-banner a {
      color: #fbbf24;
      text-decoration: underline;
    }

    .cms-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f8fafc;
    }
    .cms-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .cms-loading p {
      margin-top: 16px;
      color: #64748b;
      font-size: 16px;
    }
    .cms-loading .login-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cms-loading .login-btn:hover {
      background: #d97706;
    }
    .cms-loading .error-msg {
      color: #dc2626;
      margin-top: 10px;
      font-size: 14px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <div id="cms-loading" class="cms-loading">
    <div class="spinner"></div>
    <p id="cms-status">正在加载...</p>
    <button id="login-btn" class="login-btn" style="display: none;">点击登录</button>
    <p id="error-msg" class="error-msg" style="display: none;"></p>
  </div>

  <div id="cms-banner" class="cms-help-banner" style="display: none;">
    📋 <strong>NailTask 内容管理系统</strong> —
    操作手册请访问 <a href="/admin/cms-manual.html" target="_blank">CMS操作手册</a> |
    技术支持: info@smartnailing.com
  </div>

  <!-- 1. 首先加载 Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    (function() {
      var statusEl = document.getElementById('cms-status');
      var loginBtn = document.getElementById('login-btn');
      var errorMsg = document.getElementById('error-msg');
      var cmsLoaded = false;

      // 显示错误信息
      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
      }

      // 显示登录按钮
      function showLoginButton() {
        statusEl.textContent = '请点击下方按钮登录';
        loginBtn.style.display = 'block';
      }

      // 加载 CMS
      function loadCMS() {
        if (cmsLoaded) return;
        cmsLoaded = true;

        document.getElementById('cms-loading').style.display = 'none';
        document.getElementById('cms-banner').style.display = 'block';

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        script.onload = function() {
          if (typeof CMS !== 'undefined') {
            CMS.registerPreviewStyle('/admin/preview.css');
          }
        };
        script.onerror = function() {
          showError('CMS 加载失败，请刷新页面重试');
        };
        document.body.appendChild(script);
      }

      // 打开登录弹窗
      function openLogin() {
        if (typeof netlifyIdentity !== 'undefined') {
          netlifyIdentity.open('login');
        } else {
          showError('Identity Widget 未加载，请刷新页面');
        }
      }

      // 绑定登录按钮点击事件
      loginBtn.addEventListener('click', openLogin);

      // 等待 Identity Widget 加载
      function waitForIdentity(callback, maxAttempts) {
        var attempts = 0;
        var interval = setInterval(function() {
          attempts++;
          if (typeof netlifyIdentity !== 'undefined') {
            clearInterval(interval);
            callback();
          } else if (attempts >= maxAttempts) {
            clearInterval(interval);
            statusEl.textContent = 'Identity Widget 加载超时';
            showError('请刷新页面重试，或检查网络连接');
            showLoginButton();
          }
        }, 200);
      }

      // 初始化 Identity
      function initIdentity() {
        statusEl.textContent = '正在初始化认证...';

        // 检查 URL 中是否有特殊 token
        var hash = window.location.hash || '';
        var hasInviteToken = hash.indexOf('invite_token=') !== -1;
        var hasRecoveryToken = hash.indexOf('recovery_token=') !== -1;
        var hasConfirmToken = hash.indexOf('confirmation_token=') !== -1;
        var hasAccessToken = hash.indexOf('access_token=') !== -1;
        var hasToken = hasInviteToken || hasRecoveryToken || hasConfirmToken || hasAccessToken;

        if (hasToken) {
          statusEl.textContent = '正在处理认证令牌...';
        }

        // 监听 init 事件
        netlifyIdentity.on('init', function(user) {
          console.log('[CMS] Identity initialized, user:', user ? user.email : 'none');

          if (user) {
            statusEl.textContent = '已登录，正在加载 CMS...';
            loadCMS();
          } else {
            showLoginButton();
            // 如果没有 token，自动打开登录弹窗
            if (!hasToken) {
              setTimeout(openLogin, 300);
            }
          }
        });

        // 监听登录事件
        netlifyIdentity.on('login', function(user) {
          console.log('[CMS] User logged in:', user.email);
          statusEl.textContent = '登录成功，正在加载 CMS...';
          loginBtn.style.display = 'none';
          netlifyIdentity.close();
          loadCMS();
        });

        // 监听登出事件
        netlifyIdentity.on('logout', function() {
          console.log('[CMS] User logged out');
          window.location.reload();
        });

        // 监听错误事件
        netlifyIdentity.on('error', function(err) {
          console.error('[CMS] Identity error:', err);
          showError('认证错误: ' + (err.message || JSON.stringify(err)));
          showLoginButton();
        });

        // 监听关闭事件（用户可能关闭了弹窗而没有登录）
        netlifyIdentity.on('close', function() {
          var user = netlifyIdentity.currentUser();
          if (!user && !cmsLoaded) {
            showLoginButton();
          }
        });

        // 初始化
        try {
          netlifyIdentity.init({
            locale: 'en'
          });
        } catch (e) {
          console.error('[CMS] Init error:', e);
          showError('初始化失败: ' + e.message);
          showLoginButton();
        }
      }

      // 页面加载完成后开始初始化
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          waitForIdentity(initIdentity, 50);
        });
      } else {
        waitForIdentity(initIdentity, 50);
      }
    })();
  </script>
</body>
</html>
