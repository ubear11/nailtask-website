<!DOCTYPE html>
<html>
  <body>
    <!-- This file exists only so Netlify registers the distributor form at build time. -->
    <form name="distributor" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="company" />
      <input type="text" name="contact" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="country" />
      <input type="text" name="territory" />
      <input type="text" name="businessType" />
      <input type="text" name="experience" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
