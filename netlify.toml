# ============================================================
# NailTask 网站 Netlify 配置
# ============================================================

[build]
  command = "pnpm install && pnpm run build"
  publish = "dist/client"
  functions = "netlify/functions"

# 环境变量
[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# ============================================================
# 开发服务器配置
# ============================================================
[dev]
  command = "pnpm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false

# ============================================================
# 表单处理 & 通知配置
# ============================================================
# 注意: 表单通知需要在 Netlify Dashboard 中配置:
# Site Settings → Forms → Form notifications
# 添加邮件通知到管理员邮箱

# ============================================================
# 重定向规则
# ============================================================

# Admin CMS 路由 (确保静态文件可访问)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# ============================================================
# 安全头配置
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 允许 Identity Widget 的 iframe
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# ============================================================
# Functions 配置
# ============================================================
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
